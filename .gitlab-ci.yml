stages:
  - test
  - analyze
  - build
  - package
  - release
  - deploy

variables:
  C_UTILS_REPO: "https://git.airies.net/vifair22/c-utils.git"
  # Pi runtime libs are pinned to Debian trixie (Debian 13). The CI base image
  # must match so the cross-compiled binary's libc/libssl ABI lines up with
  # what's actually installed on upspi/upspi2/upspi3.
  DEBIAN_FRONTEND: noninteractive

# Native build + run all tests (C cmocka suite + frontend Vitest).
test:
  stage: test
  image: debian:trixie
  tags:
    - docker
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        build-essential pkg-config git curl unzip ca-certificates
        libcmocka-dev libmodbus-dev libsqlite3-dev libcurl4-openssl-dev
        libmicrohttpd-dev libssl-dev
    - curl -fsSL https://bun.sh/install | bash
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - git clone --depth 1 "$C_UTILS_REPO" /tmp/c-utils
    - make -C /tmp/c-utils
  script:
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - make CUTILS_DIR=/tmp/c-utils test-junit
    - cd frontend && bun install --frozen-lockfile && bun run test:junit
  artifacts:
    when: always
    paths:
      - build/tests/*.junit.xml
      - frontend/test-results.junit.xml
    reports:
      junit:
        - build/tests/*.junit.xml
        - frontend/test-results.junit.xml
    expire_in: 1 week

# Static analysis: cppcheck + stack-usage + gcc-fanalyzer + clang-tidy.
analyze:
  stage: analyze
  image: debian:trixie
  tags:
    - docker
  needs:
    - test
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        build-essential pkg-config git ca-certificates
        libcmocka-dev libmodbus-dev libsqlite3-dev libcurl4-openssl-dev
        libmicrohttpd-dev libssl-dev
        cppcheck clang-tidy
    - git clone --depth 1 "$C_UTILS_REPO" /tmp/c-utils
    - make -C /tmp/c-utils
  script:
    - make CUTILS_DIR=/tmp/c-utils analyze
    - make CUTILS_DIR=/tmp/c-utils lint

# Backend (C) coverage report + threshold gate. Threshold is currently 75%
# (matches the present baseline); ratchet up toward the global 80% standard
# as new tests land. Cobertura artifact lets GitLab annotate per-file
# coverage in the MR diff view; the `coverage:` regex below feeds the
# pipeline-view percentage and the project's default coverage badge.
coverage:backend:
  stage: analyze
  image: debian:trixie
  tags:
    - docker
  needs:
    - test
  variables:
    COVERAGE_LINE_THRESHOLD: "80"
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        build-essential pkg-config git ca-certificates
        libcmocka-dev libmodbus-dev libsqlite3-dev libcurl4-openssl-dev
        libmicrohttpd-dev libssl-dev
        gcovr
    - git clone --depth 1 "$C_UTILS_REPO" /tmp/c-utils
    - make -C /tmp/c-utils
  script:
    - make CUTILS_DIR=/tmp/c-utils coverage
    - gcovr --root . --filter 'src/' --exclude 'src/daemon/'
        --cobertura build/coverage/cobertura.xml
        --fail-under-line "$COVERAGE_LINE_THRESHOLD"
        --print-summary
  coverage: '/^lines: (\d+\.\d+)%/'
  artifacts:
    when: always
    paths:
      - build/coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: build/coverage/cobertura.xml
    expire_in: 1 week

# Frontend (TypeScript/React) coverage. Vitest under Bun cannot use the
# v8 provider (no Node inspector exposed), so we run the istanbul provider
# instead — configured in frontend/vite.config.ts. Threshold is currently
# 70% (baseline is ~72%); ratchet up toward 80% as new tests land. The
# threshold is passed via CLI so local `bun run test:coverage` stays
# unhampered. Cobertura artifact merges with the backend one in the MR
# diff view, giving per-file annotations across both stacks.
coverage:frontend:
  stage: analyze
  image: debian:trixie
  tags:
    - docker
  needs:
    - test
  variables:
    COVERAGE_LINE_THRESHOLD: "80"
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends curl ca-certificates unzip
    - curl -fsSL https://bun.sh/install | bash
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
  script:
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - cd frontend
    - bun install --frozen-lockfile
    - bun run vitest run --coverage
        --coverage.thresholds.lines="$COVERAGE_LINE_THRESHOLD"
  coverage: '/^Lines\s*:\s*(\d+\.\d+)%/'
  artifacts:
    when: always
    paths:
      - frontend/coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
    expire_in: 1 week

# Cross-compile to aarch64 against Debian multi-arch arm64 runtime libs. The
# native pass inside `make cross` (which runs the C test suite again) is what
# guarantees the cross step never starts with a broken tree.
build:
  stage: build
  image: debian:trixie
  tags:
    - docker
  needs:
    - test
    - analyze
  before_script:
    - dpkg --add-architecture arm64
    - apt-get update -qq
    # --force-overwrite works around a Debian trixie packaging bug where
    # libpsl-dev:amd64 and libpsl-dev:arm64 each ship /usr/share/man/man3/
    # libpsl.3.gz with non-identical file metadata, causing dpkg to refuse
    # the multi-arch coinstall. The man-page content is the same; the
    # overwrite is harmless.
    - apt-get install -y --no-install-recommends
        -o Dpkg::Options::=--force-overwrite
        build-essential gcc-aarch64-linux-gnu pkg-config git curl unzip ca-certificates
        xxd brotli
        libcmocka-dev
        libmodbus-dev libsqlite3-dev libcurl4-openssl-dev libmicrohttpd-dev libssl-dev
        libmodbus-dev:arm64 libsqlite3-dev:arm64 libcurl4-openssl-dev:arm64
        libmicrohttpd-dev:arm64 libssl-dev:arm64
        file
    - curl -fsSL https://bun.sh/install | bash
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - git clone --depth 1 "$C_UTILS_REPO" /tmp/c-utils
  script:
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - make cross
        CUTILS_DIR=/tmp/c-utils
        CROSS_PREFIX=aarch64-linux-gnu-
        CROSS_SYSROOT_INCLUDES="-I/usr/include/aarch64-linux-gnu -I/usr/include"
        CROSS_SYSROOT_LIBS="-L/usr/lib/aarch64-linux-gnu -Wl,-rpath-link,/usr/lib/aarch64-linux-gnu"
    - file build/airies-upsd | grep -q "ARM aarch64"
    - file build/airies-ups  | grep -q "ARM aarch64"
  artifacts:
    paths:
      - build/airies-upsd
      - build/airies-ups
    expire_in: 1 month

# Native amd64 build of the daemon. Mirrors `build:` (which produces the
# arm64 cross-compile for the Pis) and feeds package:deb:amd64. Skips the
# cmocka run that `make all` bundles — the dedicated test: stage already
# covered that.
build:amd64:
  stage: build
  image: debian:trixie
  tags:
    - docker
  needs:
    - test
    - analyze
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        build-essential pkg-config git curl unzip ca-certificates
        libmodbus-dev libsqlite3-dev libcurl4-openssl-dev
        libmicrohttpd-dev libssl-dev
        xxd brotli file
    - curl -fsSL https://bun.sh/install | bash
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - git clone --depth 1 "$C_UTILS_REPO" /tmp/c-utils
    - make -C /tmp/c-utils
  script:
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - make CUTILS_DIR=/tmp/c-utils frontend
    - make CUTILS_DIR=/tmp/c-utils embed-frontend embed-migrations
    - make CUTILS_DIR=/tmp/c-utils BUILD_TYPE=release EMBED=1 _build
    - file build/airies-upsd | grep -q "x86-64"
    - file build/airies-ups  | grep -q "x86-64"
  artifacts:
    paths:
      - build/airies-upsd
      - build/airies-ups
    expire_in: 1 month

# Per-arch .deb packages. Both run in parallel under the package stage.
# Runtime libs are resolved at apt-install time on the target host —
# the .deb just declares them in Depends. Always-on (every pipeline) so
# MRs can verify the package builds and download it as a job artifact.
.package_deb_template: &package_deb_template
  stage: package
  image: debian:trixie
  tags:
    - docker
  before_script:
    # `binutils` provides /usr/bin/strip for native amd64 binaries;
    # `binutils-aarch64-linux-gnu` provides aarch64-linux-gnu-strip,
    # needed because the host strip refuses foreign-arch ELFs.
    - apt-get update -qq
    - apt-get install -y --no-install-recommends
        $STRIP_PACKAGE file

package:deb:amd64:
  <<: *package_deb_template
  needs:
    - build:amd64
  variables:
    STRIP_PACKAGE: binutils
  script:
    - bash scripts/build-deb.sh amd64
    - ls -lh dist/
  artifacts:
    paths:
      - dist/airies-ups_*_amd64.deb
    expire_in: 1 month

package:deb:arm64:
  <<: *package_deb_template
  needs:
    - build
  variables:
    STRIP_PACKAGE: binutils-aarch64-linux-gnu
  script:
    - STRIP=aarch64-linux-gnu-strip bash scripts/build-deb.sh arm64
    - ls -lh dist/
  artifacts:
    paths:
      - dist/airies-ups_*_arm64.deb
    expire_in: 1 month

# Publish .deb files to the Generic Package Registry and create a GitLab
# Release. Two jobs share the stage:
#
#   release:nightly  fires on every master push. Uploads to
#                    packages/airies-ups/nightly/ with stable filenames
#                    (overwrite), and recreates the "nightly" Release at
#                    the new commit so the Releases page always reflects
#                    the latest master snapshot.
#
#   release:stable   fires on git tags (e.g. `git tag v0.1.0 && git push
#                    --tags`). Uploads to packages/airies-ups/<tag>/ and
#                    creates an immutable tagged Release.
#
# release-cli is the official tool for the release: keyword; it shells
# out to the GitLab API. curl handles the package-registry uploads
# alongside it (release-cli doesn't upload, only references URLs).
release:nightly:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - docker
  needs:
    - job: package:deb:amd64
      artifacts: true
    - job: package:deb:arm64
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  before_script:
    - apk add --no-cache curl
  script:
    # Stable filenames in the registry — internal Version metadata still
    # carries the timestamp+SHA, but a permanent URL beats scraping
    # pipeline IDs. ?select=package_file replaces the previous nightly.
    - |
      set -euo pipefail
      for arch in amd64 arm64; do
        src=$(ls dist/airies-ups_*_${arch}.deb | head -1)
        echo "Uploading $src as airies-ups_${arch}.deb"
        curl --fail --silent --show-error \
             --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$src" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/airies-ups/nightly/airies-ups_${arch}.deb?select=package_file&status=default"
      done
    # Tear down previous nightly Release + tag so we can recreate at the
    # new commit. Both DELETEs are idempotent (404 on first run is fine).
    #
    # CI_JOB_TOKEN can delete a Release object but NOT the underlying git
    # tag — same scope limit that forces release:auto-tag to use
    # RELEASE_TAG_TOKEN for tag creation. Without this, the tag DELETE
    # silently 403s and the subsequent `release:` keyword's create-with-
    # ref: sees the existing tag and (per release-cli docs) ignores
    # `ref:` — leaving the nightly tag stuck at the first commit forever
    # while the Release object's description correctly advances.
    - |
      curl --silent --request DELETE \
           --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/nightly" >/dev/null || true
      curl --silent --request DELETE \
           --header "PRIVATE-TOKEN: $RELEASE_TAG_TOKEN" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags/nightly" >/dev/null || true
  release:
    tag_name: nightly
    ref: $CI_COMMIT_SHA
    name: 'Nightly ($CI_COMMIT_SHORT_SHA)'
    description: |
      Rolling snapshot of master, refreshed on every push.

      Commit: $CI_COMMIT_SHORT_SHA — `$CI_COMMIT_TITLE`

      For testing the latest changes. Production deployments should pin to a tagged stable release.
    assets:
      links:
        - name: 'airies-ups_amd64.deb'
          url: '$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/airies-ups/nightly/airies-ups_amd64.deb'
          link_type: package
        - name: 'airies-ups_arm64.deb'
          url: '$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/airies-ups/nightly/airies-ups_arm64.deb'
          link_type: package

# Auto-tag stable releases off a `release_version` bump on master. When
# the semver string in release_version changes since the previous master
# commit, this job creates `v<semver>` via the GitLab API at the current
# SHA. The new tag triggers a pipeline whose release:stable job does the
# actual upload + Release creation — so the tagged commit is guaranteed
# to have already passed test/analyze/build/package on master.
#
# Requires CI variable RELEASE_TAG_TOKEN: a Project Access Token with
# `api` scope. CI_JOB_TOKEN cannot create tags via the API. The job
# fails loudly if the variable is missing rather than silently skipping.
release:auto-tag:
  stage: release
  # alpine/git's ENTRYPOINT is `git`, so a plain `image: alpine/git:latest`
  # makes CI's `sh -c "<step_script>"` resolve as `git sh -c "..."` and die
  # with `'sh' is not a git command`. Override the entrypoint so the runner
  # can invoke /bin/sh normally; the image still has `git` on PATH.
  image:
    name: alpine/git:latest
    entrypoint: [""]
  tags:
    - docker
  needs:
    - test
    - analyze
    - package:deb:amd64
    - package:deb:arm64
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  before_script:
    - apk add --no-cache curl
  script:
    - |
      set -eu
      # CI's default depth (20) makes HEAD~1 reachable; the file is small
      # enough that `git show` is cheap regardless.
      PREV=$(git show HEAD~1:release_version 2>/dev/null | tr -d '[:space:]' || echo "")
      CURR=$(tr -d '[:space:]' < release_version)
      if [ "$PREV" = "$CURR" ]; then
          echo "release_version unchanged ($CURR); no tag to create."
          exit 0
      fi
      echo "release_version bumped: ${PREV:-<none>} -> $CURR"

      TAG="v${CURR}"
      # Idempotent: a re-run of this same master commit (e.g. retry after
      # a transient failure) finds the tag already at the same SHA and
      # exits cleanly instead of erroring.
      if curl --silent --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
              "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags/${TAG}" \
              >/dev/null 2>&1; then
          echo "Tag $TAG already exists; nothing to do."
          exit 0
      fi

      if [ -z "${RELEASE_TAG_TOKEN:-}" ]; then
          echo "ERROR: RELEASE_TAG_TOKEN is not set." >&2
          echo "Create a Project Access Token with 'api' scope and add it" >&2
          echo "as a masked, protected CI variable named RELEASE_TAG_TOKEN." >&2
          exit 1
      fi

      curl --fail --silent --show-error --request POST \
           --header "PRIVATE-TOKEN: $RELEASE_TAG_TOKEN" \
           --data-urlencode "tag_name=${TAG}" \
           --data-urlencode "ref=${CI_COMMIT_SHA}" \
           --data-urlencode "message=Tag ${TAG} from release_version bump (auto)" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags"
      echo
      echo "Tag $TAG created at ${CI_COMMIT_SHORT_SHA}. release:stable will run in the tag pipeline."

release:stable:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - docker
  needs:
    - job: package:deb:amd64
      artifacts: true
    - job: package:deb:arm64
      artifacts: true
  # Restrict to semver tags only (vMAJOR.MINOR.PATCH) — the `nightly` tag
  # created by release:nightly also fires a tag pipeline, and matching it
  # here caused release-cli to collide with the nightly Release that
  # release:nightly had just created.
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'
  before_script:
    - apk add --no-cache curl
  script:
    # Tagged uploads are immutable — no ?select=package_file. The git tag
    # IS the package version, so re-running the same tag's pipeline would
    # 409 here, which is the desired safety: tagged releases never change.
    - |
      set -euo pipefail
      for arch in amd64 arm64; do
        src=$(ls dist/airies-ups_*_${arch}.deb | head -1)
        dst="airies-ups_${CI_COMMIT_TAG}_${arch}.deb"
        echo "Uploading $src as $dst"
        curl --fail --silent --show-error \
             --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$src" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/airies-ups/${CI_COMMIT_TAG}/${dst}"
      done
  release:
    tag_name: $CI_COMMIT_TAG
    name: '$CI_COMMIT_TAG'
    description: |
      Stable release of airies-ups $CI_COMMIT_TAG.
    assets:
      links:
        - name: 'airies-ups_${CI_COMMIT_TAG}_amd64.deb'
          url: '$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/airies-ups/${CI_COMMIT_TAG}/airies-ups_${CI_COMMIT_TAG}_amd64.deb'
          link_type: package
        - name: 'airies-ups_${CI_COMMIT_TAG}_arm64.deb'
          url: '$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/airies-ups/${CI_COMMIT_TAG}/airies-ups_${CI_COMMIT_TAG}_arm64.deb'
          link_type: package

# Build + push the multi-arch Docker image for external users / Unraid hosts.
# Independent of the bare-metal Pi deploy — that path uses the cross-compiled
# binary from `build:` directly. The image embeds its own build of the daemon
# (the Dockerfile re-runs the build inside debian:trixie per platform via
# QEMU) so it doesn't share artifacts with the build job.
#
# Tag scheme mirrors the .deb release scheme:
#   master push  → :nightly + :<short_sha>
#   git tag      → :<tag> + :latest + :<short_sha>     (e.g. :v0.1.0 + :latest)
#   MR / branch  → smoke build only, no push
#
# `:latest` follows the Docker community convention — points at the most
# recent stable release, NOT the latest master. Use `:nightly` for the
# bleeding-edge master snapshot.
package:docker:
  stage: package
  image: docker:27
  services:
    - docker:27-dind
  tags:
    - docker
    - unraid
  needs:
    - test
    - analyze
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER"
        --password-stdin "$CI_REGISTRY"
    # binfmt registers QEMU handlers for cross-arch emulation so the arm64
    # leg of the multi-arch build can run on the amd64 runner.
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx create --use --name multi
  script:
    - SHA_TAG="$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    # Smoke build — amd64 only, loaded into local docker so we can run it.
    - docker buildx build --platform linux/amd64 --load -t "$SHA_TAG" .
    - docker run -d --rm --name smoke "$SHA_TAG"
    - sleep 5
    # If the daemon crashed, the container is gone; this grep fails the job.
    - docker ps --filter "name=smoke" --format '{{.Names}}' | grep -q '^smoke$'
    - docker stop smoke
    # Multi-arch push. amd64 leg hits the buildx layer cache from the smoke
    # build above, so the arm64 build is the only real cost here.
    - |
      TAGS=""
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        TAGS="-t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG -t $CI_REGISTRY_IMAGE:latest -t $SHA_TAG"
      elif [ "${CI_COMMIT_BRANCH:-}" = "master" ]; then
        TAGS="-t $CI_REGISTRY_IMAGE:nightly -t $SHA_TAG"
      fi
      if [ -n "$TAGS" ]; then
        docker buildx build --platform linux/amd64,linux/arm64 --push $TAGS .
      else
        echo "MR / branch pipeline — built and smoked, not pushing."
      fi

# Push the nightly .deb to each Pi listed in $UPS_DEPLOY_HOSTS via a
# dynamically-generated child pipeline. One job per host so each shows
# up as its own line in the pipeline graph and can be retried
# independently. Children run in parallel — UPS daemons are independent
# across Pis and a synchronized bounce is acceptable.
#
# Each child pulls the package:deb:arm64 artifact, scp's it onto the Pi,
# and `apt-get install`s it. apt resolves runtime deps from the trixie
# repo automatically; the .deb's postinst (re)starts the service.
#
# Pis must already be on the .deb-managed layout (system user airies-ups,
# state in /var/lib/airies-ups). Use scripts/migrate-pi-to-deb.sh once
# per host to convert from the legacy /home/sysadmin/airies-ups layout
# before the first deploy through this path.
generate_deploy_child_pipeline:
  stage: deploy
  image: debian:trixie
  tags:
    - docker
    - unraid
  needs:
    - package:deb:arm64
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends python3
  script:
    - |
      set -euo pipefail
      : "${UPS_DEPLOY_HOSTS:?UPS_DEPLOY_HOSTS is not set}"
      python3 - <<'PY'
      import os, re, sys

      raw = os.environ.get("UPS_DEPLOY_HOSTS", "")
      hosts = [h.strip() for h in raw.splitlines()
               if h.strip() and not h.strip().startswith("#")]
      if not hosts:
          print("UPS_DEPLOY_HOSTS is empty", file=sys.stderr)
          sys.exit(1)

      # $CI_PIPELINE_ID inside the generator is the parent's pipeline ID.
      # We embed it literally into the child YAML — $CI_PARENT_PIPELINE_ID
      # is not reliably exposed at child-pipeline expansion time and yields
      # missing_dependency_failure on every child job.
      parent_pid = os.environ.get("CI_PIPELINE_ID", "")
      if not parent_pid:
          print("CI_PIPELINE_ID is not set", file=sys.stderr)
          sys.exit(1)

      def slug(h):
          return re.sub(r"[^a-zA-Z0-9]+", "_", h).strip("_")

      def q(s):
          return '"' + s.replace("\\", "\\\\").replace('"', '\\"') + '"'

      out = ["stages: [deploy]", ""]
      for host in hosts:
          name = "deploy_" + slug(host)
          out += [
              f"{name}:",
              "  stage: deploy",
              "  image: debian:trixie",
              "  tags: [docker, unraid]",
              "  variables:",
              f"    UPS_HOST: {q(host)}",
              "  needs:",
              f"    - pipeline: \"{parent_pid}\"",
              "      job: package:deb:arm64",
              "      artifacts: true",
              "  before_script:",
              "    - apt-get update -qq",
              "    - apt-get install -y --no-install-recommends openssh-client ca-certificates",
              "    - mkdir -p ~/.ssh && chmod 700 ~/.ssh",
              '    - cp "$DEPLOY_SSH_KEY" ~/.ssh/id_ed25519',
              "    # GitLab File variables strip trailing newlines;",
              '    # OpenSSH refuses to load the key with "error in libcrypto" without one.',
              "    - printf '\\n' >> ~/.ssh/id_ed25519",
              "    - chmod 600 ~/.ssh/id_ed25519",
              '    - ssh-keyscan -H "$UPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null',
              "  script:",
              "    - DEB=$(ls dist/airies-ups_*_arm64.deb | head -1)",
              "    - NAME=$(basename \"$DEB\")",
              '    - scp "$DEB" "sysadmin@$UPS_HOST:/tmp/$NAME"',
              "    # apt-get install of a local .deb upgrades-or-installs in",
              "    # place; postinst (re)starts the service via deb-systemd-helper.",
              '    - ssh "sysadmin@$UPS_HOST" "sudo apt-get install -y /tmp/$NAME && rm /tmp/$NAME"',
              "    - sleep 2",
              '    - ssh "sysadmin@$UPS_HOST" "systemctl is-active airies-ups.service"',
              "",
          ]

      with open("deploy-child.yml", "w", encoding="utf-8") as f:
          f.write("\n".join(out))

      print(f"Generated deploy-child.yml with {len(hosts)} job(s).")
      PY
    - cat deploy-child.yml
